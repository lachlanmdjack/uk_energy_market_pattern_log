<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GB Net Interconnector Flow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f7f6f3;
    --surface:   #ffffff;
    --border:    rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.15);
    --text:      #18181b;
    --muted:     #6b7280;
    --faint:     #9ca3af;
    --imp:       #0d9e6e;
    --imp-fill:  rgba(13,158,110,0.10);
    --exp:       #dc3545;
    --exp-fill:  rgba(220,53,69,0.10);
    --zero:      rgba(0,0,0,0.18);
    --radius:    12px;
  }

  body {
    font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 28px clamp(16px, 3vw, 36px) 48px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 22px;
  }

  .title-block h1 {
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .day-nav {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius);
    padding: 4px;
  }

  .day-nav button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1;
    transition: background 0.1s, color 0.1s;
    font-family: inherit;
  }
  .day-nav button:hover { background: var(--bg); color: var(--text); }
  .day-nav button:disabled { opacity: 0.3; cursor: default; }

  #date-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    min-width: 96px;
    text-align: center;
    padding: 0 4px;
  }

  input[type=date] {
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius);
    padding: 7px 10px;
    cursor: pointer;
    font-family: inherit;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    background: var(--surface);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius);
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    font-family: inherit;
  }
  .refresh-btn:hover { background: var(--bg); color: var(--text); }
  .refresh-btn svg { flex-shrink: 0; }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .live-pill {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
    border: 0.5px solid var(--border-md);
    color: var(--imp);
    font-weight: 500;
    background: var(--surface);
  }
  .live-pill.hist { color: var(--muted); }
  .live-pill.live { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* chart card */
  .chart-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
  }

  .chart-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .legend {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
    height: 340px;
  }

  .chart-status {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--muted);
    pointer-events: none;
  }

  .chart-status.err { color: var(--exp); }

  #last-updated {
    font-size: 11px;
    color: var(--faint);
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>GB Net Interconnector Flow</h1>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
    <div id="last-updated"></div>
    <div class="controls">
      <div class="day-nav">
        <button id="btn-prev" onclick="shiftDay(-1)">&#8592;</button>
        <span id="date-label">—</span>
        <button id="btn-next" onclick="shiftDay(1)">&#8594;</button>
      </div>
      <input type="date" id="date-input" onchange="goToDay(this.value)" />
      <button class="daybtn" id="btn-today" onclick="goToDay(todayStr())">Today</button>
      <span id="mode-pill" class="live-pill live">● Live</span>
      <button class="refresh-btn" id="btn-refresh" onclick="loadAll()">
        <svg id="refresh-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>


<div class="chart-card">
  <div class="chart-head">
    <div class="chart-title">Net interconnector flow over time</div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#0d9e6e"></span>Importing</div>
      <div class="legend-item"><span class="legend-dot" style="background:#dc3545"></span>Exporting</div>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="net-chart" role="img" aria-label="Line chart of net GB interconnector flow in GW over 24 hours. Positive values are imports, negative are exports.">Net interconnector flow chart</canvas>
    <div id="chart-status" class="chart-status">Loading…</div>
  </div>
</div>



<script>
const BASE = "https://data.elexon.co.uk/bmrs/api/v1";

/* ─── helpers ─── */
const isoZ      = (d) => d.toISOString().slice(0,16) + "Z";
const localYmd  = (d) => { const z = new Date(d.getTime() - d.getTimezoneOffset()*60000); return z.toISOString().slice(0,10); };
const todayStr  = ()  => localYmd(new Date());
const isToday   = (s) => s === todayStr();
const ukTime    = (iso) => { try { return new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"}).format(new Date(iso)); } catch { return ""; } };
const prettyDate = (s) => { const d = new Date(s+"T12:00:00Z"); return isNaN(d) ? s : new Intl.DateTimeFormat("en-GB",{weekday:"long",day:"numeric",month:"short",year:"numeric",timeZone:"UTC"}).format(d); };
const getTime   = (r) => r.startTime||r.StartTime||r.start_time||r.publishTime||r.PublishTime||r.measurementTime||null;
function num(r, regexes){ for(const k of Object.keys(r)){ if(regexes.some(re=>re.test(k))){ const v=Number(r[k]); if(!isNaN(v)) return v; } } return null; }
const rowsOf    = (j) => Array.isArray(j) ? j : (j && (j.data || j.results)) || [];
async function fetchJson(url){ const r = await fetch(url,{headers:{Accept:"application/json"}}); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }
async function fetchFirst(urls){ let last=null; for(const u of urls){ try{ const rows=rowsOf(await fetchJson(u)); if(Array.isArray(rows)&&rows.length) return rows; }catch(e){ last=e; } } if(last) throw last; return []; }

/* ─── state ─── */
let selectedDate = todayStr();
let chartInst    = null;

function buildWindow(){
  if(isToday(selectedDate)){
    const now   = new Date();
    const start = new Date(now); start.setHours(0,0,0,0);
    return { live:true, fISO:isoZ(start), tISO:isoZ(now), fD:todayStr(), tD:todayStr() };
  }
  const start = new Date(selectedDate+"T00:00:00Z");
  const end   = new Date(start); end.setUTCDate(end.getUTCDate()+1);
  return { live:false, fISO:isoZ(start), tISO:isoZ(end), fD:selectedDate, tD:selectedDate };
}

/* ─── data loading ─── */
async function loadGenerationRows(w){ return fetchFirst([
  `${BASE}/datasets/FUELHH?publishDateTimeFrom=${w.fISO}&publishDateTimeTo=${w.tISO}&format=json`,
  `${BASE}/datasets/FUELHH?settlementDateFrom=${w.fD}&settlementDateTo=${w.tD}&format=json`,
  `${BASE}/generation/outturn/summary?startTime=${w.fISO}&endTime=${w.tISO}&format=json`,
]); }

/* ─── builder ─── */
function buildNetSeries(rows, dateStr){
  const byTime = new Map();
  for(const r of rows){
    const t  = getTime(r);
    const ft = String(r.fuelType||r.FuelType||r.psrType||"").toUpperCase();
    const v  = num(r,[/generation/i,/quantity/i,/^value$/i,/output/i]);
    if(!t||!ft||v==null) continue;
    if(!ft.startsWith("INT")) continue;  // only interconnectors
    byTime.set(t, (byTime.get(t)||0) + v);
  }

  // Build a complete 00:00-23:30 skeleton for the chosen date (UTC midnight = 00:00 UK in winter, 01:00 in summer)
  // We anchor off real data — just sort and return all points we have
  const times = [...byTime.keys()].sort();
  return times
    .filter(t => {
      // keep only analysis_entries_here that fall within the settlement day we're viewing
      // For history: within dateStr UTC day. For live: everything we got.
      if(!dateStr) return true;
      const d = new Date(t);
      if(isNaN(d)) return true;
      return true; // keep all — we label them in UK time
    })
    .map(t => ({ time: t, net: (byTime.get(t)||0) / 1000 }));
}

/* ─── chart ─── */
function drawChart(series){
  const ctx    = document.getElementById("net-chart");
  const labels = series.map(d => ukTime(d.time));
  const vals   = series.map(d => d.net);

  // split into positive (import) and export segments for coloured fill
  // We use a single line with a segment colouring callback
  const cfg = {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Net flow",
        data: vals,
        borderWidth: 2,
        fill: {
          target: "origin",
          above:  "rgba(13,158,110,0.12)",
          below:  "rgba(220,53,69,0.10)",
        },
        segment: {
          borderColor: ctx => ctx.p0.parsed.y >= 0 ? "#0d9e6e" : "#dc3545",
        },
        tension: 0.2,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: ctx => ctx.raw >= 0 ? "#0d9e6e" : "#dc3545",
      }]
    },
    options: {
      responsive:        true,
      maintainAspectRatio: false,
      interaction:       { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#fff",
          borderColor:     "rgba(0,0,0,0.12)",
          borderWidth:     1,
          titleColor:      "#6b7280",
          bodyColor:       "#18181b",
          padding:         10,
          cornerRadius:    8,
          callbacks: {
            title:  items => items[0].label + " UK",
            label:  ctx => {
              const v = ctx.parsed.y;
              const sign = v >= 0 ? "+" : "";
              const dir  = v >= 0 ? "importing" : "exporting";
              return ` ${sign}${v.toFixed(2)} GW (${dir})`;
            }
          }
        }
      },
      scales: {
        x: {
          grid:  { display: false },
          ticks: {
            color: "#9ca3af",
            font:  { size: 11 },
            maxTicksLimit: 13,
            autoSkip: true,
            maxRotation: 0,
          },
          border: { display: false },
        },
        y: {
          grid: {
            color: ctx => ctx.tick.value === 0 ? "rgba(0,0,0,0.25)" : "rgba(0,0,0,0.06)",
            lineWidth: ctx => ctx.tick.value === 0 ? 1.5 : 1,
          },
          ticks: {
            color: "#9ca3af",
            font:  { size: 11 },
            callback: v => (v >= 0 ? "+" : "") + v.toFixed(1) + " GW",
          },
          border: { display: false },
        }
      }
    }
  };

  if(chartInst){ chartInst.data = cfg.data; chartInst.options = cfg.options; chartInst.update("none"); }
  else { chartInst = new Chart(ctx, cfg); }
}

/* ─── UI state ─── */
function setStatus(msg, isErr){
  const el = document.getElementById("chart-status");
  el.textContent = msg;
  el.className   = "chart-status" + (isErr ? " err" : "");
  el.style.display = msg ? "flex" : "none";
}

function syncControls(){
  const today = todayStr();
  document.getElementById("btn-next").disabled  = selectedDate >= today;
  document.getElementById("btn-today").disabled = selectedDate === today;
  document.getElementById("date-input").value   = selectedDate;

  let label = prettyDate(selectedDate);
  if(selectedDate === today) label = "Today";
  else if(selectedDate === localYmd(new Date(Date.now()-86400000))) label = "Yesterday";
  document.getElementById("date-label").textContent = label;

  const pill = document.getElementById("mode-pill");
  if(isToday(selectedDate)){ pill.className="live-pill live"; pill.textContent="● Live"; }
  else { pill.className="live-pill hist"; pill.textContent="◷ "+selectedDate; }
}

/* ─── main load ─── */
let busy = false;
async function loadAll(){
  if(busy) return; busy = true;
  const btn = document.getElementById("btn-refresh");
  const ico = document.getElementById("refresh-icon");
  btn.disabled = true; ico.parentElement.classList.add("spinning");
  setStatus("Loading…", false);

  try {
    const w    = buildWindow();
    const rows = await loadGenerationRows(w);
    if(!rows.length) throw new Error("No data returned for this date — Elexon only keeps ~24 hours of rolling data.");

    const series = buildNetSeries(rows, selectedDate);
    if(!series.length) throw new Error("No interconnector data found in response.");

    drawChart(series);
    setStatus("", false);

    const now = new Date();
    document.getElementById("last-updated").textContent =
      "Updated " + now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}) + " UTC";

  } catch(e) {
    setStatus("Could not load data: " + e.message, true);
  } finally {
    btn.disabled = false; ico.parentElement.classList.remove("spinning"); busy = false;
  }
}

/* ─── navigation ─── */
function goToDay(s){
  if(!s) return;
  if(s > todayStr()) s = todayStr();
  selectedDate = s;
  syncControls();
  loadAll();
}
function shiftDay(delta){
  const d = new Date(selectedDate + "T00:00:00");
  d.setDate(d.getDate() + delta);
  goToDay(localYmd(d));
}

/* ─── boot ─── */
const datePick = document.getElementById("date-input");
datePick.max = todayStr();

syncControls();
loadAll();
setInterval(() => { if(isToday(selectedDate)) loadAll(); }, 5 * 60 * 1000);
</script>
</body>
</html>
